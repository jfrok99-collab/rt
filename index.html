<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Sakura Page</title>

    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@700&display=swap" rel="stylesheet">

    <style>
        /* PAGE BACKGROUND */
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #0b0f2a, #1b1440, #2a1b4a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Padauk", sans-serif;
        }

        /* CENTER MESSAGE */
        .center-text {
            position: absolute;
            color: #ffffff;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6),
                0 0 20px rgba(255, 192, 203, 0.6),
                0 0 30px rgba(255, 105, 180, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* GLOW ANIMATION */
        @keyframes glow {
            from {
                transform: scale(1);
                opacity: 0.8;
            }

            to {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        /* SAKURA PETALS */
        .petal {
            position: absolute;
            top: -10px;
            font-size: 18px;
            color: #ffb7c5;
            pointer-events: none;
            opacity: 0.9;
            animation: fall linear forwards;
        }

        /* FALL ANIMATION */
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="center-text">
        🌸 I Miss You 🌸
    </div>

    <script>

        const petals = ["🌸", "🌺", "💮", "🌷"];

        function createPetal() {
            const p = document.createElement("div");
            p.classList.add("petal");

            p.innerHTML = petals[Math.floor(Math.random() * petals.length)];

            p.style.left = Math.random() * 100 + "vw";
            p.style.fontSize = (12 + Math.random() * 18) + "px";

            let duration = 5 + Math.random() * 5;
            p.style.animationDuration = duration + "s";

            document.body.appendChild(p);

            setTimeout(() => {
                p.remove();
            }, duration * 1000);
        }

        /* initial petals */
        for (let i = 0; i < 25; i++) {
            setTimeout(createPetal, i * 200);
        }

        /* continuous falling */
        setInterval(createPetal, 300);

    </script>

</body>

</html>
